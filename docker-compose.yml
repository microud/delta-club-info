services:
  postgres:
    image: postgres:16.4-bookworm
    container_name: delta-club-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: delta_club
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
